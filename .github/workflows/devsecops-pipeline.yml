name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  # CODE QUALITY CHECK
  code-quality:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run ESlint
        run: npm run lint

  # SAST SCAN
  sast-scan:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          docker run --rm -v "$PWD:/src" returntocorp/semgrep semgrep scan --config auto --json > semgrep-report.json

      - name: Upload SAST Report
        uses: actions/upload-artifacts@v4
        with:
          name: semgrep-report
          path: semgrep-report.json

  # SECRETS SCAN
  secrets-scan:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run tufflehogging
        uses: tufflesecurity/tufflehog@main

  # DEPENDENCY SCAN
  dependency-check:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --json > dependency-report.json || true

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: dependency-report.json

  # DOCKERFILE SCAN
  dockerfile-scan:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Dockerfile Lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # TESTS
  tests:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  # BUILD & PUSH
  build:
    runs-on: self-hosted
    needs:
      [
        code-quality,
        sast-scan,
        secrets-scan,
        dependency-check,
        dockerfile-scan,
        tests,
      ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ vars.DOCKER_USERNAME }}/nodejs-devsecops:latest .

      - name: Push Docker Image
        run: docker push ${{ vars.DOCKER_USERNAME }}/nodejs-devsecops:latest

  # IMAGE SCAN
  image-scan:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.DOCKER_USERNAME }}/nodejs-devsecops:latest
          format: table
          output: trivy-report.txt
          severity: "HIGH,CRITICAL"

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.txt

  # SBOM GENERATION
  sbom:
    runs-on: self-hosted
    needs: image-scan
    steps:
      - name: Generate SBOM
        uses: anchore/sbom-action@v0

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: sbom.spdx.json

  # DEPLOY
  deploy:
    runs-on: self-hosted
    needs: sbom
    steps:
      - name: Pull Latest Image
        run: docker pull ${{ vars.DOCKER_USERNAME }}/nodejs-devsecops:latest

      - name: Stop Existing Container
        run: docker stop node-app || true

      - name: Remove Old Container
        run: docker rm node-app || true

      - name: Run Container
        run: docker run -d -p 3000:3000 --name node-app ${{ vars.DOCKER_USERNAME }}/nodejs-devsecops:latest
