name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  # Docker storage cleaner
  cleanup:
    runs-on: self-hosted

    steps:
      - name: Cleanup Docker
        run: |
          docker system prune -af || true
          docker image prune -af || true
          rm -rf ~/.cache/trivy || true

  # CODE QUALITY CHECK
  code-quality:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run ESlint
        run: npm run lint

  # SAST SCAN
  sast-scan:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          docker run --rm -v "$PWD:/src" returntocorp/semgrep semgrep scan --config auto --json > semgrep-report.json

      - name: Upload SAST Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json

  # SECRETS SCANS
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run trufflehogging
        run: |
          docker run --rm \
          --memory=512m \
          -v "$PWD:/repo" \
          ghcr.io/trufflesecurity/trufflehog:latest \
          filesystem /repo --no-update

  # DEPENDENCY SCAN
  dependency-check:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --json > dependency-report.json || true

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: dependency-report.json

  # DOCKERFILE SCAN
  dockerfile-scan:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Dockerfile Lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # TESTS
  tests:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  # BUILD & PUSH
  build:
    runs-on: self-hosted
    needs:
      [
        code-quality,
        sast-scan,
        secrets-scan,
        dependency-check,
        dockerfile-scan,
        tests,
      ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ vars.DOCKER_USERNAME }}/nodejs-devsecops:latest .

      - name: Push Docker Image
        run: docker push ${{ vars.DOCKER_USERNAME }}/nodejs-devsecops:latest

  # IMAGE SCAN
  image-scan:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Try DockerHub Login (non-blocking)
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Generate Trivy Report
        run: |
          set +e

          trivy_exit=0

          docker pull ${{ vars.DOCKER_USERNAME }}/nodejs-devsecops:latest
          pull_exit=$?

          if [ $pull_exit -ne 0 ]; then
            trivy_exit=$pull_exit
            echo "Failed to pull image for Trivy scan. Check DockerHub credentials/image visibility." > trivy-report.txt
          else
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$PWD:/work" \
              aquasec/trivy:latest \
              image \
              --severity HIGH,CRITICAL \
              --format table \
              --output /work/trivy-report.txt \
              ${{ vars.DOCKER_USERNAME }}/nodejs-devsecops:latest
            trivy_exit=$?
          fi

          if [ ! -s trivy-report.txt ]; then
            echo "Trivy report was not generated. Check the 'Generate Trivy Report' logs for the root cause." > trivy-report.txt
          fi

          echo "TRIVY_EXIT_CODE=$trivy_exit" >> "$GITHUB_ENV"
          echo "Trivy step completed with exit code: $trivy_exit"
          exit 0

      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.txt
          if-no-files-found: error

  # SBOM GENERATION
  sbom:
    runs-on: self-hosted
    needs: image-scan
    steps:
      - name: Try DockerHub Login (non-blocking)
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Generate SBOM
        run: |
          set +e

          IMAGE="${{ vars.DOCKER_USERNAME }}/nodejs-devsecops:latest"
          sbom_exit=0

          # Fast path: use the local image already built on this runner.
          if docker image inspect "$IMAGE" >/dev/null 2>&1; then
            echo "Using local image for SBOM generation: $IMAGE"
          else
            echo "Local image not found, pulling from DockerHub: $IMAGE"
            docker pull "$IMAGE"
            pull_exit=$?
            if [ $pull_exit -ne 0 ]; then
              sbom_exit=$pull_exit
            fi
          fi

          if [ $sbom_exit -eq 0 ]; then
            # If syft is installed on runner, use it directly (faster than dockerized syft).
            if command -v syft >/dev/null 2>&1; then
              syft "$IMAGE" --scope squashed -o spdx-json > sbom.spdx.json
              sbom_exit=$?
            else
              docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                anchore/syft:latest \
                "$IMAGE" \
                --scope squashed \
                -o spdx-json > sbom.spdx.json
              sbom_exit=$?
            fi
          fi

          if [ ! -s sbom.spdx.json ]; then
            echo '{"status":"SBOM generation failed","message":"Check Generate SBOM logs for details."}' > sbom.spdx.json
          fi

          echo "SBOM_EXIT_CODE=$sbom_exit" >> "$GITHUB_ENV"
          echo "SBOM step completed with exit code: $sbom_exit"
          exit 0

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: sbom.spdx.json
          if-no-files-found: error

  # DEPLOY
  deploy:
    runs-on: self-hosted
    needs: sbom
    steps:
      - name: Pull Latest Image
        run: docker pull ${{ vars.DOCKER_USERNAME }}/nodejs-devsecops:latest

      - name: Stop Existing Container
        run: docker stop node-app || true

      - name: Remove Old Container
        run: docker rm node-app || true

      - name: Run Container
        run: docker run -d -p 3000:3000 --name node-app ${{ vars.DOCKER_USERNAME }}/nodejs-devsecops:latest
