name: Security Scan

on:
  push:
    branches:
      - main

jobs:
  trivy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH, CRITICAL
