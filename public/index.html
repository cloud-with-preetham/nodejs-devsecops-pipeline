<!doctype html>
<html>
  <head>
    <title>Node DevSecOps Pipeline</title>

    <style>
      body {
        margin: 0;
        font-family: system-ui;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        text-align: center;
      }

      .container {
        max-width: 1000px;
        margin: auto;
        padding: 80px 20px;
      }

      h1 {
        font-size: 48px;
        background: linear-gradient(90deg, #38bdf8, #6366f1);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
      }

      .subtitle {
        color: #94a3b8;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-top: 40px;
      }

      .card {
        background: #1e293b;
        padding: 25px;
        border-radius: 12px;
        border: 1px solid #334155;
      }

      .pipeline {
        margin-top: 60px;
      }

      .step {
        display: inline-block;
        margin: 6px;
        padding: 10px 18px;
        background: #0f172a;
        border-radius: 8px;
        border: 1px solid #334155;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Node.js DevSecOps Pipeline</h1>

      <p class="subtitle">CI/CD powered by GitHub Actions</p>

      <div class="grid">
        <div class="card">
          <h3>Backend</h3>
          <p>Node.js + Express</p>
        </div>

        <div class="card">
          <h3>CI/CD</h3>
          <p>GitHub Actions</p>
        </div>

        <div class="card">
          <h3>Security</h3>
          <p>Trivy Scan</p>
        </div>

        <div class="card">
          <h3>Container</h3>
          <p>Docker</p>
        </div>
      </div>

      <div class="pipeline">
        <h2>Pipeline Workflow</h2>

        <span class="step">Push</span>
        <span class="step">Install</span>
        <span class="step">Lint</span>
        <span class="step">Test</span>
        <span class="step">Security Scan</span>
        <span class="step">Docker Build</span>
        <span class="step">Deploy</span>
      </div>
    </div>
  </body>
</html>
